    <style>
      :root {
        --ss-slate-980: #070d14;
        --ss-slate-950: #0f1824;
        --ss-slate-900: #182432;
        --ss-slate-850: #213142;
        --ss-slate-700: #42576d;
        --ss-slate-500: #6c8198;
        --ss-slate-300: #aebcca;
        --ss-slate-100: #e7edf3;
        --ss-paper: #f3f6f9;
        --ss-white: #fcfeff;
        --ss-teal-600: #0e9f96;
        --ss-teal-500: #26c8bc;
        --ss-teal-400: #5ce3d7;
        --ss-teal-200: #b8f0eb;
        --ss-teal-glow: rgba(38, 200, 188, 0.22);
      }

      body {
        font-family: 'Space Grotesk', sans-serif;
        background: radial-gradient(circle at 15% 15%, #213142 0%, #101c2b 30%, #070d14 78%);
        color: var(--ss-slate-100);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
      }

      .font-editorial {
        font-family: 'Cormorant Garamond', serif;
      }

      .font-signal-mono {
        font-family: 'IBM Plex Mono', monospace;
      }

      .bg-os-shell {
        background: linear-gradient(165deg, rgba(16, 28, 43, 0.96), rgba(7, 13, 20, 0.98));
      }

      .bg-os-panel {
        background: linear-gradient(155deg, rgba(24, 36, 50, 0.94), rgba(16, 26, 37, 0.94));
      }

      .bg-os-paper {
        background: var(--ss-paper);
        color: #111f2c;
      }

      .ring-os {
        box-shadow: inset 0 0 0 1px rgba(174, 188, 202, 0.14);
      }

      .ring-os-active {
        box-shadow: inset 0 0 0 1px var(--ss-teal-500), 0 0 0 1px var(--ss-teal-glow), 0 12px 40px -20px var(--ss-teal-glow);
      }

      .btn-os-primary {
        background: linear-gradient(135deg, var(--ss-teal-500), #149f93);
        color: #042623;
      }

      .btn-os-primary:hover {
        filter: brightness(1.06);
      }

      .text-teal {
        color: var(--ss-teal-500);
      }

      .teal-dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: var(--ss-teal-500);
        box-shadow: 0 0 0 4px rgba(38, 200, 188, 0.18);
      }

      @keyframes aiPulse {
        0% { box-shadow: 0 0 0 0 rgba(38, 200, 188, 0.36); }
        65% { box-shadow: 0 0 0 10px rgba(38, 200, 188, 0); }
        100% { box-shadow: 0 0 0 0 rgba(38, 200, 188, 0); }
      }

      .ai-thinking {
        animation: aiPulse 1.8s ease-out infinite;
      }

      /* Hide scrollbar for clean UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* AGENTIC OS MOTION TOKENS */
      
      /* Easing */
      .ease-exit { transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1); }
      .ease-standard { transition-timing-function: cubic-bezier(0.65, 0, 0.35, 1); }
      .ease-spring-soft { transition-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.275); } /* Approx spring */

      /* Durations */
      .dur-xs { transition-duration: 120ms; }
      .dur-sm { transition-duration: 180ms; }
      .dur-md { transition-duration: 260ms; }
      .dur-lg { transition-duration: 420ms; }
      .dur-cinematic { transition-duration: 1100ms; }

      /* Editorial Formatting */
      .drop-cap::first-letter {
        float: left;
        font-family: 'Cormorant Garamond', serif;
        font-size: 3.5rem;
        line-height: 0.8;
        margin-right: 0.75rem;
        margin-top: 0.25rem;
        font-weight: 400;
      }
      
      /* Custom Shadows */
      .shadow-card-hover {
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.02);
      }
      
      /* Intro Animation Sequence Classes */
      .intro-container-transition {
        transition: background-color 2s cubic-bezier(0.22, 1, 0.36, 1);
      }
      
      .intro-card {
        will-change: transform, opacity, box-shadow;
        /* Long, luxurious duration for the 'slide out' */
        transition: 
          transform 1.4s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.8s ease-out,
          box-shadow 0.5s ease;
      }

      /* State: The Stack (Scene 1-2) */
      /* Cards are translated to center and rotated slightly */
      .intro-stack-state {
        transform: translate(var(--intro-x), var(--intro-y)) rotate(var(--intro-r)) scale(1.05);
        box-shadow: -5px 10px 20px rgba(0,0,0,0.5);
        z-index: 50; /* Force on top */
        pointer-events: none;
        border-color: rgba(255,255,255,0.1);
      }

      /* State: The Grid (Scene 4) */
      /* Cards return to natural flow */
      .intro-grid-state {
        transform: translate(0px, 0px) rotate(0deg) scale(1);
        z-index: 0;
      }

      /* Content Reveal */
      .intro-content-hidden {
        opacity: 0;
        transform: translateY(5px);
      }
      .intro-content-visible {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        transition-delay: 0.4s; /* Wait for grid to lock in */
      }
      
      /* Animation Keyframes */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-up {
        animation: fadeUp 0.42s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      
      @keyframes shimmer {
        from { transform: translateX(-150%); }
        to { transform: translateX(150%); }
      }
      .animate-shimmer {
        animation: shimmer 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      /* Sophisticated Loader Animations */
      @keyframes construct {
        0% { transform: scale(0.8) rotate(0deg); opacity: 0; }
        25% { opacity: 0.5; }
        75% { opacity: 0.5; }
        100% { transform: scale(1.1) rotate(45deg); opacity: 0; }
      }
      .animate-construct {
        animation: construct 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      /* Mobile Interaction Pulse */
      @keyframes mobilePulse {
        0% { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); transform: scale(1.025); border-color: transparent; }
        50% { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); transform: scale(1.04); border-color: rgba(0,0,0,0.05); }
        100% { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); transform: scale(1.025); border-color: transparent; }
      }

      .mobile-active-card {
        animation: mobilePulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        background-color: white !important;
        z-index: 30 !important;
      }
      
    </style>
